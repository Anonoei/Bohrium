[gcode_button manual_push] 
pin: buffer_mcu: PA1
press_gcode:
release_gcode:
    {% if printer["filament_switch_sensor filament_sensor"].filament_detected and printer["print_stats"].state != "printing" and printer["gcode_button stall_push_stop"].state != "PRESSED" %}
        {% if printer["gcode_macro _filament_buffer"].is_manual_feeding %}
            SET_GCODE_VARIABLE MACRO=_filament_buffer VARIABLE=stop_feeding VALUE=True
            SET_GCODE_VARIABLE MACRO=_filament_buffer VARIABLE=is_manual_feeding VALUE=False
            BUFFER_STEPPER STEPPER=filament_buffer ENABLE=0
            UPDATE_DELAYED_GCODE ID=feed_loop DURATION=0
        {% else %}
            SET_GCODE_VARIABLE MACRO=_filament_buffer VARIABLE=stop_feeding VALUE=False
            SET_GCODE_VARIABLE MACRO=_filament_buffer VARIABLE=is_manual_feeding VALUE=True
            BUFFER_STEPPER STEPPER=filament_buffer ENABLE=1
            FEED_LOOP
        {% endif %}
    {% endif %}

[gcode_button stall_push_stop] 
pin: ^buffer_mcu: PB10
press_gcode:
    SET_GCODE_VARIABLE MACRO=_filament_buffer VARIABLE=stop_feeding VALUE=True
    SET_GCODE_VARIABLE MACRO=_filament_buffer VARIABLE=is_manual_feeding VALUE=False
release_gcode: