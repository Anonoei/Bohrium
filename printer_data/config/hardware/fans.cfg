#####################################################################
#   Fans
#####################################################################

[fan_generic EXHAUST_IN] # K_FAN1 auxiliary fan
pin: PB0
max_power: 1.0

[fan_generic EXHAUST_OUT] # K_FAN2 exhaust fan
pin: PE11
max_power: 1.0

# [heater_fan PS_FAN]      
