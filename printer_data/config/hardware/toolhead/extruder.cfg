#####################################################################
#    Extruder
#####################################################################

[adc_temperature extruder_thermistor]
temperature1:25
resistance1:1268.60
temperature2:180
resistance2:1920.98
temperature3:300
resistance3:2398.52

[extruder]
step_pin:    th: EXT_STEP
dir_pin:     th: EXT_DIR
enable_pin: !th: EXT_EN   
rotation_distance: 6.5 
microsteps: 16                
full_steps_per_rotation: 200 
nozzle_diameter: 0.400        
filament_diameter: 1.75  
max_extrude_only_distance: 150     
max_extrude_cross_section: 60
heater_pin: th: HE_EN
sensor_type: extruder_thermistor  
pullup_resistor: 11500
sensor_pin: th: HE_TH
min_temp: -0
max_temp: 310
max_power: 1.0
min_extrude_temp: 150
control : pid
pid_kp : 34.838
pid_ki : 4.976
pid_kd : 62.823
pressure_advance: 0.025
pressure_advance_smooth_time: 0.035

[tmc2209 extruder]
uart_pin: th: EXT_UART
interpolate: True
run_current: 0.8
hold_current: 0.3
uart_address:3
sense_resistor: 0.150

[verify_heater extruder]      
max_error: 120                
check_gain_time:30           
hysteresis: 10              
heating_gain: 2     
