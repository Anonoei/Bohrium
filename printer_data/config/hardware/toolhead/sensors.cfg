#####################################################################
#    Sensors
#####################################################################


[temperature_sensor TH_MCU]
sensor_type: temperature_mcu
sensor_mcu: th

[heater_fan hotend_fan]
pin: th: FAN_HE_EN
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 45
tachometer_pin: th: FAN_HE_MON
tachometer_ppr: 1
tachometer_poll_interval: 0.0013

# [fan_generic PART_FAN1] # rear part cooling fan
# pin: th: PA7
# max_power: 1.0
# [fan_generic PART_FAN2] # front part cooling fan
# pin: th: PB0
# max_power: 1.0

[multi_pin PART_FANS]
pins: th: PB0, th: PA7
[fan]
pin: multi_pin:PART_FANS
max_power: 1.0

[lis2dw]
cs_pin: th: LIS_CS
spi_software_sclk_pin: th: LIS_SCLK
spi_software_mosi_pin: th: LIS_MOSI
spi_software_miso_pin: th: LIS_MISO
axes_map: x,z,y
